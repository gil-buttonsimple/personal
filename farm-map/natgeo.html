<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>K-Farm, a Piedmont documentary</title>
<link href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
<style>
  :root{--gold:#c8a24a;--ink:#ece7d8;--dim:#9aa08c;--panel:#161b15;--edge:#2c3528;
        --bnd:#ffd86b;--water:#4da3ff;--stand:#ff5a4d}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:
    radial-gradient(120% 90% at 50% 0%,#1c241b,#0e120f 58%,#080a07);
    color:var(--ink);font:14px/1.5 -apple-system,Segoe UI,Roboto,Arial,sans-serif;cursor:default}

  /* live flythrough: full-bleed in flight, shrinks to a centered hero in pages mode */
  #map{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;
    transition:top 1.6s cubic-bezier(.6,.02,.2,1),left 1.6s cubic-bezier(.6,.02,.2,1),
               right 1.6s cubic-bezier(.6,.02,.2,1),bottom 1.6s cubic-bezier(.6,.02,.2,1),
               border-radius 1.6s ease, box-shadow 1.6s ease}
  body.pages #map{top:5%;bottom:5%;left:28%;right:28%;
    border:2px solid var(--gold);border-radius:8px;box-shadow:0 16px 60px rgba(0,0,0,.7)}
  .maplibregl-ctrl-top-left,.maplibregl-ctrl-top-right{display:none}
  .maplibregl-ctrl-attrib{opacity:.25;font-size:10px}

  .vignette{position:absolute;inset:0;z-index:2;pointer-events:none;opacity:1;transition:opacity 1.4s ease;
    box-shadow:inset 0 0 260px 70px rgba(0,0,0,.6);
    background:linear-gradient(180deg,rgba(0,0,0,.32),transparent 16%,transparent 80%,rgba(0,0,0,.5))}
  body.pages .vignette{opacity:.35}

  /* unified subtitle: bottom-centered, center-justified, movie-yellow. Drives the cosmic
     descent beats AND the in-flight layer/POI labels. No panel -- just captioned text. */
  #sub{position:absolute;left:50%;bottom:8%;transform:translate(-50%,12px);z-index:6;
    max-width:80%;text-align:center;pointer-events:none;
    font:700 25px/1.35 -apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#ffe24a;letter-spacing:.3px;
    text-shadow:0 0 2px #000,0 2px 5px #000,1px 1px 0 #000,-1px 1px 0 #000;
    opacity:0;transition:opacity .85s ease,transform .85s cubic-bezier(.6,.02,.2,1)}
  #sub.show{opacity:1;transform:translate(-50%,0)}
  body.pages #sub{opacity:0!important}

  /* compass rose, top-right. Hidden in space; fades in at the state level and tracks true north. */
  .compass{position:absolute;top:18px;right:18px;z-index:6;width:76px;height:76px;
    opacity:0;transition:opacity 1.3s ease;pointer-events:none;
    filter:drop-shadow(0 2px 7px rgba(0,0,0,.6))}
  .compass.show{opacity:.92}
  #compassRose{width:100%;height:100%;transform-origin:50% 50%;transition:transform .3s linear}

  /* the key: builds itself as layers reveal; bottom-left in flight, moves into the panel in pages */
  .key{position:absolute;right:46px;bottom:54px;z-index:4;
    background:linear-gradient(180deg,rgba(18,22,16,.7),rgba(12,15,11,.8));
    border:1px solid var(--edge);border-radius:10px;padding:11px 14px;min-width:172px;
    opacity:0;transition:opacity 1s ease;backdrop-filter:blur(2px)}
  .key.show{opacity:1}
  .key h2{margin:0 0 7px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:600}
  .key .row{display:flex;align-items:center;gap:9px;font-size:13px;margin:5px 0;
    opacity:0;transform:translateX(-8px);transition:opacity .6s ease,transform .6s cubic-bezier(.6,.02,.2,1)}
  .key .row.in{opacity:1;transform:none}
  .key .sw{width:13px;height:13px;border-radius:3px;flex:none;box-shadow:0 0 0 1px rgba(255,255,255,.15)}
  /* in pages the key tucks under the right panel */
  body.pages .key{left:auto;right:26px;bottom:26px;background:transparent;border:0;backdrop-filter:none;padding:0}

  /* documentary side panels: off-screen in flight, slide in on pages */
  .side{position:absolute;top:0;bottom:0;z-index:3;width:28%;display:flex;flex-direction:column;
    gap:13px;padding:26px 24px;opacity:0;transition:transform 1.6s cubic-bezier(.6,.02,.2,1),opacity 1.2s ease}
  .side.left{left:0;transform:translateX(-40px)}
  .side.right{right:0;transform:translateX(40px)}
  body.pages .side{opacity:1;transform:none}

  .title .kicker{color:var(--gold);letter-spacing:3px;font-size:12px;text-transform:uppercase}
  .title h1{margin:2px 0 0;font:600 36px/1 "Iowan Old Style",Georgia,serif}
  .title h1 b{color:var(--gold)}
  .title .sub{color:var(--dim);font-size:13px;margin-top:6px}

  /* ONE morphing plate: survey sheets cross-fade in place */
  .plate{flex:1;min-height:0;border:1px solid var(--edge);border-radius:6px;overflow:hidden;position:relative;background:#0a0c08}
  .plate img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(1.05);
    opacity:0;transition:opacity 1.5s ease}
  .plate img.on{opacity:1}
  .plate .cap{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:7px 12px;font-size:12px;
    background:linear-gradient(transparent,rgba(8,10,7,.92));letter-spacing:.3px;
    transition:opacity .6s ease}
  .plate .cap b{color:var(--gold);font-weight:600}

  .card{border:1px solid var(--edge);border-radius:6px;background:var(--panel);padding:12px 14px}
  .card h2{margin:0 0 8px;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:600}
  .facts .f{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #20271c;font-size:13px}
  .facts .f:last-child{border-bottom:0}.facts .f b{color:var(--gold)}.facts .f span{color:var(--dim)}
  /* rotating documentary fact */
  #doc{position:relative;min-height:112px}
  #doc .d{position:absolute;inset:0;opacity:0;transition:opacity 1s ease}
  #doc .d.on{opacity:1}
  #doc .dk{color:var(--gold);letter-spacing:2px;font-size:11px;text-transform:uppercase}
  #doc .dt{font-size:13.5px;color:#cfd3c4;margin-top:4px;line-height:1.5}
  .poilist .p{display:flex;gap:9px;align-items:baseline;padding:6px 0;border-bottom:1px solid #20271c;cursor:pointer}
  .poilist .p:last-child{border-bottom:0}
  .poilist .p:hover .nm{color:var(--gold)}
  .poilist .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);flex:none;align-self:center;box-shadow:0 0 0 3px rgba(200,162,74,.2)}
  .poilist .nm{font-size:13.5px}.poilist .ds{color:var(--dim);font-size:11.5px}

  /* POI map pins: a unique icon each; they drop out of the sky when their key row appears.
     MapLibre positions the outer marker element and writes inline transform/opacity on it, so the
     drop animation lives on an INNER element (.pindrop) it never touches. */
  .pindrop{opacity:0;will-change:transform}
  .pindrop.drop{animation:drop 1.35s cubic-bezier(.2,.72,.3,1) forwards}
  @keyframes drop{
    0%{transform:translateY(-360px);opacity:0}
    45%{opacity:1}
    66%{transform:translateY(0)}
    79%{transform:translateY(-17px)}
    89%{transform:translateY(0)}
    95%{transform:translateY(-5px)}
    100%{transform:translateY(0);opacity:1} }
  .pin{position:relative;width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
    background:rgba(20,25,31,.96);border:2px solid #fff;display:flex;align-items:center;justify-content:center;
    box-shadow:0 9px 20px rgba(0,0,0,.55);cursor:pointer}
  .pin b{transform:rotate(45deg);font-size:15px;line-height:1;font-weight:400}
  .poilist .ic{font-size:15px;flex:none;align-self:center;width:18px;text-align:center}
  .maplibregl-popup-content{background:#1c2128;color:var(--ink);border:1px solid var(--edge);border-radius:10px;padding:11px 13px;max-width:230px}
  .maplibregl-popup-content h3{margin:0 0 4px;font-size:14px;color:var(--gold)}
  .maplibregl-popup-content p{margin:0;font-size:12px;color:#c2c9d4}
  .maplibregl-popup-tip{border-top-color:#1c2128!important;border-bottom-color:#1c2128!important}

  /* cursor auto-hide (kiosk/screensaver): hidden after stillness, returns on movement */
  body.nocursor, body.nocursor *{cursor:none!important}

  /* TV / couch mode (?tv=1): scale documentary type up for living-room viewing distance */
  body.tv #sub{font-size:34px;max-width:86%}
  body.tv .compass{width:100px;height:100px;top:24px;right:24px}
  body.tv .key{min-width:220px;padding:14px 18px}
  body.tv .key h2{font-size:14px}
  body.tv .key .row{font-size:17px}
  body.tv .key .sw{width:16px;height:16px}
  body.tv .title .kicker{font-size:15px}
  body.tv .title h1{font-size:46px}
  body.tv .title .sub{font-size:16px}
  body.tv .card h2{font-size:14px}
  body.tv .facts .f{font-size:16px}
  body.tv #doc .dk{font-size:13px}
  body.tv #doc .dt{font-size:16.5px}
  body.tv .poilist .nm{font-size:16px}
  body.tv .poilist .ds{font-size:13px}

  /* offline / network-failure fallback: all-local survey plates + title, needs no network */
  #fallback{position:absolute;inset:0;z-index:50;display:none;
    background:radial-gradient(120% 90% at 50% 0%,#1c241b,#0e120f 58%,#080a07);
    align-items:center;justify-content:center;flex-direction:column;text-align:center}
  #fallback.on{display:flex}
  #fallback .fbimg{position:absolute;inset:8% 14%;border:2px solid var(--gold);border-radius:8px;overflow:hidden;
    box-shadow:0 16px 60px rgba(0,0,0,.7)}
  #fallback .fbimg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;
    transition:opacity 1.6s ease;filter:saturate(1.05)}
  #fallback .fbimg img.on{opacity:1}
  #fallback .fbcap{position:relative;z-index:2;margin-top:auto;margin-bottom:7%;
    background:linear-gradient(180deg,rgba(18,22,16,.82),rgba(12,15,11,.92));
    border:1px solid var(--edge);border-radius:12px;padding:16px 26px;max-width:760px}
  #fallback .fbk{color:var(--gold);letter-spacing:4px;font-size:13px;text-transform:uppercase}
  #fallback .fbt{font:600 34px/1 "Iowan Old Style",Georgia,serif;margin:6px 0 0}
  #fallback .fbn{color:#cfd3c4;font-size:15px;margin-top:12px;line-height:1.5}
  body.tv #fallback .fbt{font-size:48px} body.tv #fallback .fbk{font-size:17px} body.tv #fallback .fbn{font-size:19px}
</style>
</head>
<body class="flight">
<div id="map"></div>
<div class="vignette"></div>

<div id="sub"></div>

<div class="compass"><div id="compassRose">
  <svg viewBox="0 0 100 100" width="100%" height="100%" aria-hidden="true">
    <circle cx="50" cy="50" r="45" fill="rgba(14,18,15,.5)" stroke="#c8a24a" stroke-width="1.4"/>
    <polygon points="50,11 54.5,50 45.5,50" fill="#ff5a4d"/>
    <polygon points="50,89 54.5,50 45.5,50" fill="#d8d2c0"/>
    <polygon points="11,50 50,45.5 50,54.5" fill="#9aa08c"/>
    <polygon points="89,50 50,45.5 50,54.5" fill="#9aa08c"/>
    <circle cx="50" cy="50" r="4.5" fill="#0e120f" stroke="#c8a24a" stroke-width="1"/>
    <text x="50" y="9" text-anchor="middle" font-size="11" font-weight="700" fill="#ffe24a" font-family="Georgia,serif">N</text>
  </svg>
</div></div>

<!-- documentary frame (pages mode) -->
<div class="side left">
  <div class="title"><div class="kicker">Chester County · South Carolina</div>
    <h1>K&#8209;<b>Farm</b></h1><div class="sub">Surveyed off seven 1995 sheets · read against the satellite</div></div>
  <div class="plate" id="plate"><div class="cap" id="plateCap"></div></div>
</div>

<div class="side right">
  <div class="card facts"><h2>By the numbers</h2>
    <div class="f"><span>The lake</span><b>24.5 ac</b></div>
    <div class="f"><span>Vertical relief</span><b>169 ft</b></div>
    <div class="f"><span>Lake surface</span><b>~518 ft</b></div>
    <div class="f"><span>Annual rainfall</span><b>45.9 in</b></div>
    <div class="f"><span>1995 survey sheets</span><b>7</b></div>
  </div>
  <div class="card doc"><h2>Field notes</h2><div id="doc"></div></div>
  <div class="card poilist"><h2>Points of interest</h2><div id="pois"></div></div>
</div>

<!-- offline / network-failure fallback (all-local; shown if the live map cannot load) -->
<div id="fallback">
  <div class="fbimg" id="fbimg"></div>
  <div class="fbcap">
    <div class="fbk">Chester County · South Carolina</div>
    <div class="fbt">K&#8209;Farm</div>
    <div class="fbn" id="fbn"></div>
  </div>
</div>

<script>
// ---------- geography ----------
const SOUTH=34.6455, WEST=-81.1655, NORTH=34.6770, EAST=-81.1445;
const C0=(WEST+EAST)/2, C1=(SOUTH+NORTH)/2;
const EST=[-81.1556,34.6548];   // south end of the lake
const DAM=[-81.1505,34.6660];   // dam / spillway, NE up the lake
const RIDGE=[-81.1470,34.6600]; // high ground east

// ---------- tile prefetch ----------
// Warm the property's satellite + terrain tiles up front so the FIRST flyover loop
// is sharp. Without this, tiles stream in cold (the blink / low-res first pass); they
// only cache after the first loop. Both tile hosts send cacheable responses, so these
// fetches populate the browser/disk cache that MapLibre then reads (the kiosk profile
// keeps a persistent disk cache, so it stays warm across launches). preloadDone
// resolves once every tile has settled, so the opening can WAIT on it instead of
// racing the camera against cold tiles. Zooms 10-14 cover the whole descent + drift;
// the close excursions (z15+) overzoom the z14 tiles, so no separate fetch is needed.
const preloadDone=(function preloadTiles(){
  const lon2x=(lon,n)=>Math.floor((lon+180)/360*n);
  const lat2y=(lat,n)=>{const r=lat*Math.PI/180;return Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*n);};
  const sat=(z,x,y)=>`https://tiles.maps.eox.at/wmts/1.0.0/s2cloudless-2024_3857/default/g/${z}/${y}/${x}.jpg`;
  const dem=(z,x,y)=>`https://s3.amazonaws.com/elevation-tiles-prod/terrarium/${z}/${x}/${y}.png`;
  const urls=[];
  for(let z=10; z<=14; z++){
    const n=2**z;
    const x0=lon2x(WEST,n)-1, x1=lon2x(EAST,n)+1;
    const y0=lat2y(NORTH,n)-1, y1=lat2y(SOUTH,n)+1;   // north edge has the smaller y
    for(let x=x0;x<=x1;x++) for(let y=y0;y<=y1;y++){ urls.push(sat(z,x,y)); urls.push(dem(z,x,y)); }
  }
  const total=urls.length, CAP=8;           // gentle concurrency so we don't hammer the tile hosts
  return new Promise(resolve=>{
    if(!total) return resolve();
    let i=0, settled=0;
    const pump=()=>{ while(i<total && (i-settled)<CAP){ const u=urls[i++];
      fetch(u,{mode:'no-cors',cache:'force-cache'}).catch(()=>{}).finally(()=>{
        if(++settled>=total) resolve(); else pump(); }); } };
    pump();
  });
})();

// reworked, non-private points of interest (real, on the land)
// POINT POIs only (polygons/lines are shown as layers, not pins). Built at load from the
// points you place in place-points.html (source-data/traces/poi-points.geojson). Until placed,
// there are simply no pins. Only the priority-1 set is shown for now: gate, barn, dam, dock, put-in.
let POIS=[], ROADS=[];
const POI_DESC={front_gate:'The driveway entrance off the public road.', barn:'The main barn.',
  house:'The house.', dam:'Earthen dam and spillway holding the lake.', dock:'The dock on the lake shore.',
  boat_putin:'Where boats and canoes launch.'};
const POI_COL={front_gate:'#c8a24a', barn:'#e0b878', house:'#f0d090', dam:'#9fd0ff', dock:'#8fd0ff', boat_putin:'#7bbf6a'};
const POI_SHORT={front_gate:'the gate', barn:'the barn', house:'the house', dam:'the dam', dock:'the dock', boat_putin:'the put-in'};

// rotating documentary "field notes" (pages); every line traces to screensaver-facts.md
const DOCS=[
  ['The red clay', 'A century of cotton stripped ~7 inches of topsoil off the Southern Piedmont, one of the most eroded farm regions in the country. The red is the Cecil clay left behind.'],
  ['Old-field pine', 'Worn-out fields came back in loblolly, the "old-field pine," under an oak-hickory canopy of white oak, post oak and mockernut hickory.'],
  ['First people', 'This is Catawba country: Ye Iswa, "people of the river." The Nation was federally restored in 1993; its reservation sits east, in York County.'],
  ['1780', 'A few miles south, Tarleton surprised and routed Thomas Sumter, "the Carolina Gamecock," at Fishing Creek, where it meets the Catawba.'],
  ['The divide', 'The farm rides the divide between the Catawba and Broad river drainages; Sandy River and Fishing Creek carry the runoff.'],
  ['Weather', '~45.9 inches of rain a year, mean temperature 60.4 °F, humid-subtropical, with a growing season from April into November.'],
  ['The wild', 'White-tailed deer, wild turkey, bobcat and beaver work the woods; wood ducks, South Carolina’s state duck, and bass and bream hold the pond.'],
];

// survey-sheet plate morph (pages), one frame, cross-fading in place
const PLATES=[
  ['demo/rectified/07-deed-survey-kasparek.png', 'Deed survey · 1995 · the georeference anchor'],
  ['demo/rectified/01-base-plat-clean.png',      'Base plat · the clean linework'],
  ['demo/rectified/05-habitat-full-color.png',   'Habitat &amp; cover · woods and open ground'],
  ['demo/rectified/06-master-legend-1995.png',   'Master legend · 1995'],
  ['demo/rectified/03-trails-orange-water-blue.png','Roads &amp; trails · the internal network'],
];

// five distinct ~1-minute flight patterns over the lake/dam/ridge
// Smooth continuous drift patterns (no jerky leg-to-leg easing): the camera glides on a
// gentle ellipse with a slow bearing spin. Layer reveals never disturb it; the only camera
// move is a deliberate zoom-in excursion (below).
const DRIFTS=[
  {lon:-81.1535,lat:34.6600,rx:0.0018,ry:0.0016,zoom:14.3,pitch:66,bearing:25, spin:0.018},
  {lon:-81.1520,lat:34.6622,rx:0.0016,ry:0.0014,zoom:14.4,pitch:70,bearing:135,spin:-0.016},
  {lon:-81.1546,lat:34.6582,rx:0.0020,ry:0.0017,zoom:14.2,pitch:64,bearing:300,spin:0.020},
  {lon:-81.1531,lat:34.6606,rx:0.0014,ry:0.0016,zoom:14.5,pitch:72,bearing:80, spin:0.015},
  {lon:-81.1540,lat:34.6594,rx:0.0019,ry:0.0015,zoom:14.3,pitch:68,bearing:200,spin:-0.018},
];
// the "zoom into a part of the property" highlight, rotated each cycle
const EXCURS=[
  {ll:DAM,                zoom:15.4,pitch:68,k:'Closer',t:'The dam &amp; spillway, north end of the lake'},
  {ll:[-81.1535,34.6600], zoom:15.5,pitch:66,k:'Closer',t:'Along the lake edge'},
  {ll:RIDGE,              zoom:15.2,pitch:74,k:'Closer',t:'Up onto the high ridge'},
];

// ---------- screensaver tuning: TV type scale, cursor auto-hide, offline fallback ----------
const QS=new URLSearchParams(location.search);
if(QS.get('tv')==='1'||QS.get('kiosk')==='1') document.body.classList.add('tv');

// cursor auto-hide: vanish after 3s still, reappear on movement (kiosk-friendly, harmless on desktop)
let curT; const hideCur=()=>document.body.classList.add('nocursor');
const pokeCur=()=>{ document.body.classList.remove('nocursor'); clearTimeout(curT); curT=setTimeout(hideCur,3000); };
window.addEventListener('mousemove',pokeCur); curT=setTimeout(hideCur,3000);

// offline / network-failure fallback: a calm local survey-plate slideshow + title + rotating
// field note. Uses only local demo/rectified plates and the DOCS text, so it needs no network.
let fbOn=false, fbT1, fbT2;
function triggerFallback(){
  if(fbOn) return; fbOn=true;
  const box=document.getElementById('fbimg'), note=document.getElementById('fbn');
  PLATES.forEach(([src],i)=>{ const im=document.createElement('img'); im.src=src; if(i===0) im.classList.add('on'); box.appendChild(im); });
  const imgs=box.querySelectorAll('img'); let pi=0, di=0;
  const showNote=()=>{ note.innerHTML='<b style="color:var(--gold)">'+DOCS[di%DOCS.length][0]+'</b> &middot; '+DOCS[di%DOCS.length][1]; };
  showNote();
  document.getElementById('fallback').classList.add('on');
  fbT1=setInterval(()=>{ pi++; imgs.forEach((im,n)=>im.classList.toggle('on',n===pi%imgs.length)); },6000);
  fbT2=setInterval(()=>{ di++; showNote(); },7000);
}
// watchdog: if the live map never loads (lib/CDN/tiles unreachable), fall back gracefully.
let mapReady=false;
const fbWatch=setTimeout(()=>{ if(!mapReady) triggerFallback(); }, 12000);
// guard: if the MapLibre library itself failed to load, show the fallback and stop here.
if(typeof maplibregl==='undefined'){ triggerFallback(); throw new Error('maplibregl unavailable; offline fallback shown'); }

// ---------- map ----------
const map = new maplibregl.Map({
  container:'map', maxPitch:82, fadeDuration:0, attributionControl:false,
  style:{ version:8,
    projection:{type:'globe'},
    sources:{
      sat:{ type:'raster', tileSize:256, maxzoom:14,
        tiles:['https://tiles.maps.eox.at/wmts/1.0.0/s2cloudless-2024_3857/default/g/{z}/{y}/{x}.jpg'],
        attribution:'Sentinel-2 cloudless 2024 by EOX (s2maps.eu) CC BY 4.0 · AWS Terrain Tiles · USGS NHD' },
      dem:{ type:'raster-dem', tileSize:256, maxzoom:14, encoding:'terrarium',
        tiles:['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'] },
    },
    layers:[
      { id:'bg', type:'background', paint:{'background-color':'#06080c'} },
      { id:'sat', type:'raster', source:'sat', paint:{'raster-saturation':0.1} },
    ],
    sky:{ 'sky-color':'#4a79b0','sky-horizon-blend':0.6,'horizon-color':'#e2eaf3','horizon-fog-blend':0.55,'fog-color':'#bdc9d8','fog-ground-blend':0.35 },
  },
  center:[-96,42], zoom:1.4, pitch:0, bearing:0,
});
map.addControl(new maplibregl.AttributionControl({compact:true}),'bottom-right');

let ring=null;
map.on('load', async () => {
  mapReady=true; clearTimeout(fbWatch);
  map.setTerrain({source:'dem', exaggeration:2.2});

  // --- overlay layers, all added HIDDEN with slow opacity transitions ---
  try{
    const b=await (await fetch('source-data/sheet07-boundary.geojson')).json();
    const poly=b.features.find(f=>f.geometry.type==='Polygon'); ring=poly.geometry.coordinates[0];
    map.addSource('bnd',{type:'geojson',data:poly});
    map.addLayer({id:'bnd-glow',type:'line',source:'bnd',
      paint:{'line-color':'#ffe39a','line-width':6,'line-blur':4,'line-opacity':0,
             'line-opacity-transition':{duration:1800},'line-width-transition':{duration:1400}}});
    map.addLayer({id:'bnd',type:'line',source:'bnd',
      paint:{'line-color':'#ffd86b','line-width':1.8,'line-opacity':0,
             'line-opacity-transition':{duration:1800},'line-color-transition':{duration:1400},'line-width-transition':{duration:1400}}});
  }catch(e){}
  try{
    const w=await (await fetch('source-data/derived/water.geojson')).json();
    map.addSource('water',{type:'geojson',data:w});
    map.addLayer({id:'water',type:'fill',source:'water',
      paint:{'fill-color':'#4da3ff','fill-opacity':0,'fill-opacity-transition':{duration:1800},'fill-outline-color':'#9fd0ff'}});
    map.addLayer({id:'water-edge',type:'line',source:'water',
      paint:{'line-color':'#bfe0ff','line-width':1.4,'line-opacity':0,
             'line-opacity-transition':{duration:1800},'line-color-transition':{duration:1400},'line-width-transition':{duration:1400}}});
  }catch(e){}
  try{   // PAVED public roads (OSM): each road its own layer, so they reveal ONE AT A TIME.
    // Pulled from the full OSM set, narrowed to the named roads nearest the property and
    // ordered longest-first (so the highway you arrive on leads, then the side roads).
    const ra=await (await fetch('source-data/reference/osm-roads-all.geojson')).json();
    const cos=Math.cos(C1*Math.PI/180);
    const measure=c=>{ let dmin=9,len=0,px=null;
      for(const [x,y] of c){ const dx=(x-C0)*cos, dy=y-C1; dmin=Math.min(dmin,Math.hypot(dx,dy));
        if(px) len+=Math.hypot((x-px[0])*cos,y-px[1]); px=[x,y]; }
      return {dmin,len}; };
    const named={};
    for(const f of (ra.features||[])){ const nm=f.properties&&f.properties.name; if(!nm) continue;
      const m=measure(f.geometry.coordinates);
      if(!named[nm]||m.dmin<named[nm].dmin) named[nm]={nm,dmin:m.dmin,len:m.len,feat:f}; }
    const pick=Object.values(named).filter(r=>r.dmin<0.016).sort((a,b)=>b.len-a.len).slice(0,5);
    pick.forEach((r,i)=>{ const id='rd'+i;
      map.addSource(id,{type:'geojson',data:r.feat});
      map.addLayer({id:id+'-case',type:'line',source:id,layout:{'line-cap':'round','line-join':'round'},
        paint:{'line-color':'#0c1016','line-width':6,'line-opacity':0,'line-opacity-transition':{duration:1200}}});
      map.addLayer({id:id,type:'line',source:id,layout:{'line-cap':'round','line-join':'round'},
        paint:{'line-color':'#e9eef5','line-width':2.6,'line-opacity':0,
               'line-opacity-transition':{duration:1200},'line-width-transition':{duration:1000},'line-color-transition':{duration:1000}}});
      ROADS.push({id, name:r.nm, show(){ setOp(id+'-case','line-opacity',0.7);
        pulse(id,{'line-opacity':[1,.95],'line-color':['#ffffff','#e9eef5'],'line-width':[5,2.6]}); }});
    });
  }catch(e){ ROADS=[]; }
  try{   // internal TRAILS (sheet-03 network): dashed, dirt-tan — a separate layer (deer stands hidden for now)
    const rd=await (await fetch('source-data/derived/roads.geojson')).json();
    map.addSource('trails',{type:'geojson',data:rd});
    map.addLayer({id:'trails',type:'line',source:'trails',layout:{'line-cap':'butt','line-join':'round'},
      paint:{'line-color':'#e3bd80','line-width':1.8,'line-dasharray':[2.2,1.6],'line-opacity':0,
             'line-opacity-transition':{duration:1400},'line-width-transition':{duration:1200},'line-color-transition':{duration:1200}}});
  }catch(e){}

  // --- POI map pins, built from the placed points (priority-1 only) ---
  try{
    const pj=await (await fetch('source-data/traces/poi-points.geojson',{cache:'no-store'})).json();
    POIS=(pj.features||[]).filter(f=>(f.properties||{}).pri===1).map(f=>({
      ll:f.geometry.coordinates, id:f.properties.id, t:f.properties.name, icon:f.properties.icon,
      d:POI_DESC[f.properties.id]||'', col:POI_COL[f.properties.id]||'#c8a24a'}));
  }catch(e){ POIS=[]; }
  const listEl=document.getElementById('pois');
  POIS.forEach((p)=>{
    const wrap=document.createElement('div');                 // outer: MapLibre positions this
    p.pinEl=document.createElement('div'); p.pinEl.className='pindrop';   // inner: we animate this
    const pin=document.createElement('div'); pin.className='pin'; pin.style.borderColor=p.col;
    pin.innerHTML='<b>'+p.icon+'</b>'; p.pinEl.appendChild(pin); wrap.appendChild(p.pinEl);
    const popup=new maplibregl.Popup({offset:18,closeButton:false}).setHTML('<h3>'+p.t+'</h3><p>'+p.d+'</p>');
    p.marker=new maplibregl.Marker({element:wrap,anchor:'bottom'}).setLngLat(p.ll).setPopup(popup).addTo(map);
    const row=document.createElement('div'); row.className='p';
    row.innerHTML='<span class="ic">'+p.icon+'</span><span><span class="nm">'+p.t+'</span><br><span class="ds">'+p.d+'</span></span>';
    row.onclick=()=>{ map.flyTo({center:p.ll,zoom:15.3,pitch:64,duration:2200}); p.marker.togglePopup(); };
    listEl.appendChild(row);
  });

  // build the morph plate
  const plateEl=document.getElementById('plate');
  PLATES.forEach(([src])=>{ const im=document.createElement('img'); im.src=src; plateEl.insertBefore(im,plateEl.firstChild); });

  // hold on the opening title until the close-range tiles are cached (cold start),
  // so the first descent + drift is sharp. Bounded by a 6s wall-clock cap so a slow
  // or absent network never hangs the opening; on a warm cache this resolves at once.
  // warm the close tiles briefly, then the cosmic descent (real-time ~12s), then the loop
  await Promise.race([preloadDone, wait(5000)]);
  await cosmicIntro();
  runLoop();
});

// ---------- helpers ----------
let gen=0;                                  // generation token, bumps on every phase change
const SPD=Math.max(1,+(new URLSearchParams(location.search).get('speed')||1));  // ?speed=10 to preview fast
const TS=3/SPD;             // global time-scale: 3x slower than before, from the first moment (tunable)
const D=(ms)=>ms*TS;        // scale any duration/delay
const DI=(ms)=>ms/SPD;      // intro time-scale: real-time descent, NOT the 3x documentary slow
const wait=(ms)=>new Promise(r=>setTimeout(r,ms));
function ease(o){ return new Promise(res=>{ map.easeTo({...o,essential:true}); map.once('moveend',res); }); }
function resizeDuring(ms){ const end=performance.now()+ms;(function l(){ map.resize(); if(performance.now()<end) requestAnimationFrame(l); })(); }

// unified yellow subtitle (bottom-center). setSub shows/replaces the line; clearSub fades it out.
const subEl=document.getElementById('sub');
function setSub(t){ subEl.innerHTML=t; subEl.classList.add('show'); }
function clearSub(){ subEl.classList.remove('show'); }
// toast: show a subtitle line, hold, fade. (k is kept for call-site compatibility; the line is t.)
async function toast(k,t,hold){ setSub(t); await wait(D(hold)); clearSub(); await wait(D(450)); }
// the legend/key is gone (replaced by subtitles); these stay as no-ops so call sites remain valid
function keyAdd(){} function keyClear(){}
// short POI roll-up line, built from whatever points are actually placed (so it can't lie)
function poiSummary(){ const ns=POIS.map(p=>POI_SHORT[p.id]||p.t);
  if(!ns.length) return ''; if(ns.length===1) return ns[0];
  return ns.slice(0,-1).join(', ')+' and '+ns[ns.length-1]; }
// compass rose: reveal at the state level, then keep it pointing at true north
const compassEl=document.querySelector('.compass'), compassRoseEl=document.getElementById('compassRose');
function showCompass(){ if(compassEl) compassEl.classList.add('show'); }
function updateCompass(){ if(compassRoseEl) compassRoseEl.style.transform='rotate('+(-map.getBearing())+'deg)'; }
// POI pins drop from the sky
function dropPin(p){ p.pinEl.classList.add('drop'); }
function resetPins(){ POIS.forEach(p=>p.pinEl.classList.remove('drop')); }
function allPinsDown(){ POIS.forEach(p=>p.pinEl.classList.add('drop')); }
// drop every pin in one quick staggered cascade lasting about a second
function dropAllPins(){ const n=POIS.length; POIS.forEach((p,i)=>setTimeout(()=>dropPin(p), n>1? Math.round(i*1000/(n-1)) : 0)); }

// reveal layers (fade in via paint transitions)
const setOp=(id,prop,v)=>{ if(map.getLayer(id)) map.setPaintProperty(id,prop,v); };
// reveal pulse: flash a layer bright so the eye catches it, then settle to its normal look
function pulse(id,props){            // props: {paintProp:[bright, settled]}
  if(!map.getLayer(id)) return;
  for(const p in props){ map.setPaintProperty(id,p+'-transition',{duration:240}); map.setPaintProperty(id,p,props[p][0]); }
  setTimeout(()=>{ if(!map.getLayer(id))return;
    for(const p in props){ map.setPaintProperty(id,p+'-transition',{duration:1500}); map.setPaintProperty(id,p,props[p][1]); }
  }, 850);
}
function showBoundary(){ setOp('bnd-glow','line-opacity',0.22); setOp('bnd','line-opacity',0.85);
  pulse('bnd-glow',{'line-opacity':[0.65,0.22],'line-width':[16,6]});
  pulse('bnd',{'line-color':['#ffffff','#ffd86b'],'line-width':[4.5,1.8]}); }
function showLake(){ setOp('water','fill-opacity',0.34);
  pulse('water',{'fill-opacity':[0.62,0.34]});
  pulse('water-edge',{'line-opacity':[1,0.85],'line-color':['#ffffff','#bfe0ff'],'line-width':[5,1.4]}); }
function showTrails(){
  pulse('trails',{'line-opacity':[1,0.9],'line-color':['#fff0d0','#e3bd80'],'line-width':[4.5,1.8]}); }
function hideOverlays(){ setOp('bnd-glow','line-opacity',0); setOp('bnd','line-opacity',0);
  setOp('water','fill-opacity',0); setOp('water-edge','line-opacity',0); setOp('trails','line-opacity',0);
  ROADS.forEach(r=>{ setOp(r.id,'line-opacity',0); setOp(r.id+'-case','line-opacity',0); }); }

// ---------- the loop: flight (smooth drift + layer reveals) <-> pages ----------
let patternIx=0, docIx=0, plateIx=0, docTimer=null, plateTimer=null;
let mode='boot', camF=0, drift=DRIFTS[0], pagesBrg=0;

// ONE continuous camera driver: the flyover glides and never jerks; layer reveals don't touch it.
function camFrame(){
  camF++;
  updateCompass();
  if(mode==='flight'){
    const a=camF*0.010/TS;
    map.jumpTo({center:[drift.lon+drift.rx*Math.sin(a), drift.lat+drift.ry*Math.cos(a*0.8)],
      zoom:drift.zoom+0.14*Math.sin(a*0.5), pitch:drift.pitch+3*Math.sin(a*0.4),
      bearing:drift.bearing+camF*drift.spin/TS});
  } else if(mode==='pages'){
    const a=camF*0.006/TS;
    map.jumpTo({center:[C0+0.0013*Math.sin(a*0.8), C1+0.0017*Math.cos(a*0.7)],
      zoom:14.15+0.09*Math.sin(a*0.6), pitch:53+3*Math.sin(a*0.5), bearing:pagesBrg+camF*0.02/TS});
  }
  requestAnimationFrame(camFrame);
}
requestAnimationFrame(camFrame);

// the one deliberate camera move during flight: a smooth zoom-in to a feature, then back to the drift
async function excursion(myGen, ex){
  if(gen!==myGen) return;
  mode='zoom';
  await ease({center:ex.ll, zoom:ex.zoom, pitch:ex.pitch, bearing:map.getBearing(), duration:D(2600)});
  if(gen!==myGen) return;
  toast(ex.k, ex.t, 1700);
  await wait(D(1700)); if(gen!==myGen) return;
  await ease({center:[drift.lon, drift.lat+drift.ry], zoom:drift.zoom, pitch:drift.pitch, bearing:drift.bearing, duration:D(2600)});
  if(gen!==myGen) return;
  camF=0; mode='flight';   // hand control back to the drift, seamlessly from its a=0 pose
}

// the cosmic open: globe in space -> North America -> US -> SC -> Chester County -> Chester ->
// the property. ~12s real-time. No text but the yellow place-name beats; the compass appears at
// the state level. Runs once, before the documentary loop.
async function cosmicIntro(){
  mode='boot';
  setSub('North America');
  await ease({center:[-96,42], zoom:2.4, pitch:0,  bearing:0,  duration:DI(2000)});
  setSub('United States');
  await ease({center:[-90,38], zoom:4.0, pitch:0,  bearing:0,  duration:DI(1700)});
  showCompass();                                   // compass rose fades in at the state level
  setSub('South Carolina');
  await ease({center:[-81.0,34.0], zoom:6.4, pitch:15, bearing:0,  duration:DI(1900)});
  setSub('Chester County');
  await ease({center:[-81.16,34.70], zoom:9.4, pitch:30, bearing:8,  duration:DI(1700)});
  setSub('Chester');                               // pass over the county seat, then glide SE to the farm
  await ease({center:[-81.216,34.703], zoom:12.0, pitch:48, bearing:14, duration:DI(1700)});
  setSub('K&#8209;Farm');
  await ease({center:EST, zoom:14.2, pitch:72, bearing:28, duration:DI(2300)});
  await wait(DI(800)); clearSub();
}

async function runLoop(){
  if(new URLSearchParams(location.search).get('start')==='pages') await runPages();  // preview the documentary frame directly
  while(true){ await runFlight(); await runPages(); }
}

async function runFlight(){
  const myGen=++gen;
  document.body.classList.remove('pages'); document.body.classList.add('flight');
  resizeDuring(1700);
  keyClear(); hideOverlays(); resetPins();   // pins lift back into the sky for this cycle

  // pick the next smooth drift + its zoom-in highlight, then glide in and hand to the driver
  mode='boot';
  drift=DRIFTS[patternIx%DRIFTS.length];
  const ex=EXCURS[patternIx%EXCURS.length]; patternIx++;
  await ease({center:[drift.lon,drift.lat+drift.ry],zoom:drift.zoom,pitch:drift.pitch,bearing:drift.bearing,duration:D(1400)});
  if(gen!==myGen) return;
  camF=0; mode='flight';

  // reveal sequence: each layer paints + labels + compresses into the key; then each POI pin
  // drops out of the sky exactly as its key row appears.
  await wait(D(350)); if(gen!==myGen)return;
  showBoundary();
    await toast('','The property line, surveyed 1995',1300); if(gen!==myGen)return;
  for(const r of ROADS){ r.show();                                 // roads reveal ONE AT A TIME, each named
    await toast('', r.name, 1000); if(gen!==myGen)return; }
  showTrails();
    await toast('','Old farm tracks',1100); if(gen!==myGen)return;
  showLake();                                                      // the lake, right before the pins
    await toast('','The lake, 24.5 acres',1300); if(gen!==myGen)return;
  dropAllPins();                                                   // every pin falls in a ~1s cascade
    if(POIS.length) await toast('', poiSummary(), 1500);
    if(gen!==myGen)return;
  await excursion(myGen, ex);               // the one deliberate zoom-in
  await wait(D(1400));                       // brief dwell, then the documentary pages
}

async function runPages(){
  const myGen=++gen;
  clearSub();
  document.body.classList.remove('flight'); document.body.classList.add('pages');
  allPinsDown();   // any pin not yet dropped (e.g. ?start=pages preview) lands now
  resizeDuring(1800);
  // settle smoothly onto the whole property (driver idle), then hand to the continuous drift
  mode='boot';
  await ease({center:[C0,C1],zoom:14.15,pitch:53,bearing:map.getBearing(),duration:D(1600)});
  if(gen!==myGen) return;
  pagesBrg=map.getBearing(); camF=0; mode='pages';

  // rotate the documentary field-note + the survey-sheet plate
  const docEl=document.getElementById('doc');
  if(!docEl.children.length) DOCS.forEach(([k,t])=>{ const d=document.createElement('div'); d.className='d';
    d.innerHTML='<div class="dk">'+k+'</div><div class="dt">'+t+'</div>'; docEl.appendChild(d); });
  const plateImgs=document.querySelectorAll('#plate img'); const capEl=document.getElementById('plateCap');
  const showDoc=(i)=>{ docEl.querySelectorAll('.d').forEach((d,n)=>d.classList.toggle('on',n===i%DOCS.length)); };
  const showPlate=(i)=>{ plateImgs.forEach((im,n)=>im.classList.toggle('on',n===i%plateImgs.length));
    capEl.innerHTML='<b>'+PLATES[i%PLATES.length][1].split(' · ')[0]+'</b> &middot; '+(PLATES[i%PLATES.length][1].split(' · ').slice(1).join(' · ')||''); };
  showDoc(docIx); showPlate(plateIx);
  clearInterval(docTimer); clearInterval(plateTimer);
  docTimer=setInterval(()=>{ if(gen!==myGen){clearInterval(docTimer);return;} docIx++; showDoc(docIx); },D(1500));
  plateTimer=setInterval(()=>{ if(gen!==myGen){clearInterval(plateTimer);return;} plateIx++; showPlate(plateIx); },D(1300));

  await wait(D(6000));   // pages dwell, then back to a fresh flight
}
</script>
