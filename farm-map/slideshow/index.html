<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>K-Farm — slideshow</title>
<style>
  :root{--gold:#c8a24a;--ink:#ece7d8;--dim:#9aa08c}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;cursor:none;
    background:radial-gradient(120% 90% at 50% 0%,#1c241b,#0e120f 58%,#080a07);
    color:var(--ink);font:16px/1.5 -apple-system,Segoe UI,Roboto,Arial,sans-serif}
  /* each photo: contain (no crop), centered, slow cross-fade + gentle Ken-Burns drift */
  .slide{position:absolute;inset:0;opacity:0;transition:opacity 2s ease;
    display:flex;align-items:center;justify-content:center}
  .slide.on{opacity:1}
  .slide img{max-width:92vw;max-height:88vh;object-fit:contain;
    box-shadow:0 24px 80px rgba(0,0,0,.7);border:1px solid rgba(200,162,74,.25);border-radius:4px;
    transform:scale(1);transition:transform 9s ease}
  .slide.on img{transform:scale(1.045)}
  .cap{position:absolute;left:0;right:0;bottom:38px;z-index:5;text-align:center;
    text-shadow:0 2px 18px #000;pointer-events:none}
  .cap .k{color:var(--gold);letter-spacing:5px;font-size:14px;text-transform:uppercase}
  .cap .t{margin-top:5px;font:600 26px/1 "Iowan Old Style",Georgia,serif}
</style>
</head>
<body>
<div id="stage"></div>
<div class="cap"><div class="k">Chester County · South Carolina</div><div class="t" id="capT">K&#8209;Farm</div></div>
<script>
  // local curated set (the four keepers); titles shown under each
  const SLIDES=[
    ['1-property-lines.png',   'The property lines'],
    ['2-trails.png',           'The trails'],
    ['3-trails-and-water.png', 'Trails &amp; water'],
    ['4-habitat.png',          'Woods &amp; food plots'],
  ];
  const stage=document.getElementById('stage'), capT=document.getElementById('capT');
  SLIDES.forEach(([src])=>{ const d=document.createElement('div'); d.className='slide';
    const im=document.createElement('img'); im.src=src; d.appendChild(im); stage.appendChild(d); });
  const slides=document.querySelectorAll('.slide');
  let i=0;
  const show=(n)=>{ slides.forEach((s,k)=>s.classList.toggle('on',k===n)); capT.innerHTML=SLIDES[n][1]; };
  show(0);
  setInterval(()=>{ i=(i+1)%slides.length; show(i); }, 6000);   // 6s per photo
</script>
</body>
</html>
