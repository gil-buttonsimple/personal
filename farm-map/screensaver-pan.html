<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>K-Farm Screensaver — Vertical Pan</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;
    font:14px/1.4 -apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#ece7d8}
  #stage{position:absolute;inset:0;overflow:hidden}
  .pan{position:absolute;left:50%;top:0;width:100vw;transform:translateX(-50%);
    will-change:transform;opacity:0;transition:opacity 2.5s ease}
  .pan.on{opacity:1}
  /* the tall north-up map scrolls vertically through the wide frame */
  #stage img{display:block;width:100%;height:auto}
  .vignette{position:absolute;inset:0;pointer-events:none;
    box-shadow:inset 0 0 240px 60px rgba(0,0,0,.85);
    background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,transparent 18%,transparent 82%,rgba(0,0,0,.55) 100%)}
  .frame{position:absolute;inset:0;pointer-events:none;border:1px solid rgba(200,162,74,.25)}
  .title{position:absolute;left:34px;bottom:30px;z-index:3;text-shadow:0 2px 14px #000}
  .title .k{color:#c8a24a;letter-spacing:3px;font-size:13px;text-transform:uppercase}
  .title h1{margin:2px 0 0;font:600 30px/1 "Iowan Old Style",Georgia,serif;letter-spacing:1px}
  .title .s{color:#cdd2c2;font-size:13px;margin-top:5px}
  .compass{position:absolute;top:24px;right:28px;z-index:3;width:46px;height:46px;opacity:.9}
  .cap{position:absolute;right:34px;bottom:32px;z-index:3;font-size:13px;color:#cdd2c2;
    text-shadow:0 2px 10px #000;letter-spacing:.3px}
</style>
</head>
<body>
<div id="stage">
  <div class="vignette"></div>
  <svg class="compass" viewBox="0 0 100 100" aria-hidden="true">
    <circle cx="50" cy="50" r="46" fill="rgba(8,10,7,.5)" stroke="#c8a24a" stroke-width="2"/>
    <polygon points="50,10 58,50 50,42 42,50" fill="#c8a24a"/>
    <polygon points="50,90 42,50 50,58 58,50" fill="#6b7358"/>
    <text x="50" y="27" text-anchor="middle" font-size="15" fill="#ece7d8" font-weight="700">N</text>
  </svg>
  <div class="title"><div class="k">Chester County, South Carolina</div>
    <h1>K&#8209;Farm</h1><div class="s">409.258 acres · surveyed 1995</div></div>
  <div class="cap" id="cap"></div>
  <div class="frame"></div>
</div>

<script>
// Technique: vertical Ken-Burns pan. A tall north-up sheet wider than the screen
// scrolls slowly along its long N-S axis. Pure 2D, perfect north-up, no 3D pipeline.
const SHEETS = [
  ['demo/rectified/05-habitat-full-color.png','Habitat & cover · 1995'],
  ['demo/rectified/06-master-legend-1995.png','Master legend · 1995'],
  ['demo/rectified/03-trails-orange-water-blue.png','Roads, trails & water'],
];
const stage = document.getElementById('stage'), cap = document.getElementById('cap');
const LEG = 46000;        // ms for one north<->south traverse
let idx = 0, current = null;

function showSheet(i){
  const [src,label] = SHEETS[i];
  const img = document.createElement('img');
  img.src = src;
  const wrap = document.createElement('div'); wrap.className='pan'; wrap.appendChild(img);
  stage.insertBefore(wrap, stage.querySelector('.vignette'));
  img.onload = () => {
    // travel = how far the image can scroll past the viewport, vertically
    const travel = Math.max(0, img.getBoundingClientRect().height - window.innerHeight);
    let start = null, dir = 1, from = 0;
    requestAnimationFrame(()=>{ wrap.classList.add('on'); });
    function step(ts){
      if(start===null) start = ts;
      let u = ((ts - start) / LEG);                 // 0..1 across one leg
      if(u >= 1){ start = ts; dir *= -1; from = (dir>0?0:1); u = 0; }
      const p = dir>0 ? u : 1-u;                     // ping-pong
      const e = 0.5 - 0.5*Math.cos(p*Math.PI);      // ease in/out
      const y = -e*travel;
      const scale = 1.04 + 0.06*e;                  // gentle zoom along the way
      wrap.style.transform = `translateX(-50%) translateY(${y.toFixed(1)}px) scale(${scale.toFixed(3)})`;
      wrap.style.transformOrigin = '50% ' + (e*100).toFixed(0) + '%';
      if(wrap.parentNode) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  };
  cap.textContent = label;
  // retire the previous sheet after the crossfade
  if(current){ const old = current; old.classList.remove('on'); setTimeout(()=>old.remove(), 2600); }
  current = wrap;
}

showSheet(0);
// cycle sheets so the loop doesn't repeat the same imagery
setInterval(()=>{ idx = (idx+1) % SHEETS.length; showSheet(idx); }, LEG); // swap each full leg
</script>
</body>
</html>
