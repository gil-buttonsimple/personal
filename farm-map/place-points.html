<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>K-Farm — place the points</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root{--gold:#c8a24a;--ink:#ece7d8;--dim:#9aa08c;--panel:#11150f;--edge:#2c3528;--ok:#7bbf6a}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;font:14px/1.45 -apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:#0b0e0a}
  #app{display:flex;height:100%}
  #side{width:330px;flex:none;background:linear-gradient(180deg,#11150f,#0c0f0a);border-right:1px solid var(--edge);
    display:flex;flex-direction:column;overflow:hidden}
  #side h1{margin:0;padding:16px 18px 4px;font:600 19px/1.1 "Iowan Old Style",Georgia,serif}
  #side h1 b{color:var(--gold)}
  .sub{padding:0 18px 10px;color:var(--dim);font-size:12.5px}
  .bar{display:flex;gap:8px;align-items:center;padding:8px 18px;border-top:1px solid var(--edge);border-bottom:1px solid var(--edge);background:#0e120c}
  .bar .count{font-size:13px}.bar .count b{color:var(--gold)}
  .bar button{margin-left:auto;background:var(--gold);color:#0d1014;border:0;border-radius:7px;padding:7px 12px;font-weight:700;font-size:12.5px;cursor:pointer}
  .bar .status{font-size:12px;color:var(--dim);margin-left:8px}
  #list{overflow-y:auto;flex:1;padding:6px 0 30px}
  .grp{padding:13px 18px 4px;color:var(--gold);font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600}
  .grp span{color:var(--dim);text-transform:none;letter-spacing:0;font-weight:400}
  .it{display:flex;align-items:center;gap:11px;padding:8px 18px;cursor:pointer;border-left:3px solid transparent}
  .it:hover{background:#161b12}
  .it.armed{background:#1c2415;border-left-color:var(--gold)}
  .it.done{opacity:.85}
  .it .ic{font-size:18px;width:24px;text-align:center;flex:none}
  .it .nm{flex:1}.it .nm small{display:block;color:var(--dim);font-size:11px}
  .it .st{font-size:11px;color:var(--dim);flex:none;text-align:right;min-width:54px}
  .it.done .st{color:var(--ok)}
  .it .x{flex:none;color:#7a8478;cursor:pointer;padding:0 4px;font-size:15px;visibility:hidden}
  .it.done .x{visibility:visible}.it .x:hover{color:#ff6a5a}
  #map{flex:1;position:relative}
  #hint{position:absolute;left:50%;top:14px;transform:translateX(-50%);z-index:5;background:rgba(15,18,12,.92);
    border:1px solid var(--edge);border-radius:20px;padding:8px 16px;font-size:13px;pointer-events:none;transition:opacity .3s}
  #hint b{color:var(--gold)}
  #panel{position:absolute;right:12px;top:12px;z-index:5;width:216px;max-height:calc(100% - 24px);overflow-y:auto;
    background:rgba(13,16,11,.94);border:1px solid var(--edge);border-radius:9px;padding:4px 2px;font-size:12.5px}
  .psec{padding:5px 11px 9px;border-bottom:1px solid #1b2117}
  .psec:last-child{border-bottom:0}
  .psec h3{margin:5px 0 6px;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold)}
  .psec .opt{display:block;padding:3px 0;cursor:pointer;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .psec .opt input[type=radio],.psec .opt input[type=checkbox]{margin-right:7px;vertical-align:middle}
  .psec .opt input[type=range]{vertical-align:middle}
  /* draggable pin: a center-anchored circle so the marker centre is exactly the clicked point */
  .pin{position:relative;width:28px;height:28px;border-radius:50%;
    background:rgba(20,25,31,.96);border:2px solid #fff;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 12px rgba(0,0,0,.5);cursor:grab}
  .pin b{font-size:15px;line-height:1}
  .pin::after{content:"";position:absolute;left:50%;top:50%;width:3px;height:3px;margin:-1.5px 0 0 -1.5px;
    border-radius:50%;background:#fff;box-shadow:0 0 0 1px rgba(0,0,0,.5)}  /* exact-centre dot */
</style>
</head>
<body>
<div id="app">
  <div id="side">
    <h1>K&#8209;<b>Farm</b> · place the points</h1>
    <div class="sub">Click a point on the left, then click its spot on the map. Drag any pin to nudge it. Saves automatically.</div>
    <div class="bar"><span class="count"><b id="nDone">0</b> / <span id="nTot">0</span> placed</span>
      <button id="saveBtn">Save now</button><span class="status" id="saveStat"></span></div>
    <div id="list"></div>
  </div>
  <div id="map">
    <div id="hint">Pick a point from the list, then click the map</div>
    <div id="panel"></div>
  </div>
</div>
<script>
// ---- the prioritized list of points to locate (long; do Priority 1 first) ----
const GROUPS=[
  ['Priority 1 — name & access (do these first)', [
    {id:'front_gate', name:'Front gate', hint:'where the driveway meets the road', icon:'🚪'},
    {id:'barn',       name:'The barn', hint:'main barn building', icon:'🏚'},
    {id:'dam',        name:'Dam & spillway', hint:'earthen dam at the lake', icon:'🧱'},
    {id:'dock',       name:'Dock', hint:'on the lake shore', icon:'⚓'},
    {id:'boat_putin', name:'Boat / canoe put-in', hint:'where you launch', icon:'🛶'},
  ]],
  ['Priority 2 — structures & water', [
    {id:'cabin',     name:'Cabin', hint:'', icon:'🏕'},
    {id:'shed',      name:'Shed / pole barn', hint:'', icon:'🧰'},
    {id:'well',      name:'Well / spring', hint:'', icon:'💧'},
    {id:'beaver1',   name:'Beaver dam', hint:'on the inlet creek', icon:'🦫'},
    {id:'powerline', name:'Power line crossing', hint:'', icon:'⚡'},
    {id:'culvert',   name:'Bridge / culvert', hint:'', icon:'🌉'},
    {id:'ford',      name:'Creek crossing / ford', hint:'', icon:'🪨'},
  ]],
  ['Priority 3 — land & corners', [
    {id:'parking',  name:'Parking / pull-off', hint:'', icon:'🅿'},
    {id:'camp',     name:'Camp / fire pit', hint:'', icon:'🔥'},
    {id:'foodplot', name:'Food plot', hint:'', icon:'🌽'},
    {id:'pob',      name:'Survey corner (POB)', hint:'point of beginning', icon:'📐'},
    {id:'bigtree',  name:'Landmark tree', hint:'', icon:'🌳'},
    {id:'mailbox',  name:'Mailbox', hint:'', icon:'📬'},
  ]],
];
const ALL=GROUPS.flatMap(g=>g[1]);
const META=Object.fromEntries(ALL.map(p=>[p.id,p]));
const placed={};          // id -> {lng,lat}
const markers={};         // id -> maplibregl.Marker
let armed=null, saveT=null;

// ---- map: all base maps + all reference layers + the georeferenced 1995 survey sheets ----
const BASEMAPS=[
  {id:'sat',     name:'Satellite (Sentinel-2)', maxzoom:14, attr:'EOX Sentinel-2 cloudless',
     tiles:['https://tiles.maps.eox.at/wmts/1.0.0/s2cloudless-2024_3857/default/g/{z}/{y}/{x}.jpg']},
  {id:'usgsimg', name:'USGS aerial (high-res)', maxzoom:18, attr:'USGS NAIP / The National Map',
     tiles:['https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryOnly/MapServer/tile/{z}/{y}/{x}']},
  {id:'usgsit',  name:'USGS aerial + labels', maxzoom:18, attr:'USGS The National Map',
     tiles:['https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryTopo/MapServer/tile/{z}/{y}/{x}']},
  {id:'usgstopo',name:'USGS topo', maxzoom:16, attr:'USGS The National Map',
     tiles:['https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}']},
  {id:'osm',     name:'OSM streets', maxzoom:19, attr:'© OpenStreetMap',
     tiles:['https://tile.openstreetmap.org/{z}/{x}/{y}.png']},
  {id:'topo',    name:'OpenTopoMap', maxzoom:17, attr:'© OpenTopoMap (CC-BY-SA)',
     tiles:['https://a.tile.opentopomap.org/{z}/{x}/{y}.png']},
];
const REFS=[
  {id:'bnd',    name:'Property boundary', url:'source-data/sheet07-boundary.geojson', type:'line', on:true,
     paint:{'line-color':'#ffd86b','line-width':2,'line-opacity':.9}},
  {id:'water',  name:'Lake / water', url:'source-data/derived/water.geojson', type:'fill', on:true,
     paint:{'fill-color':'#4da3ff','fill-opacity':.3,'fill-outline-color':'#bfe0ff'}},
  {id:'trails', name:'Trails (sheet 03)', url:'source-data/derived/roads.geojson', type:'line', on:true,
     paint:{'line-color':'#e3bd80','line-width':1.6,'line-dasharray':[2.2,1.6],'line-opacity':.9}},
  {id:'paved',  name:'Paved roads (OSM)', url:'source-data/reference/osm-roads.geojson', type:'line', on:true,
     paint:{'line-color':'#ffffff','line-width':2,'line-opacity':.75}},
  {id:'paved2', name:'All roads (OSM area)', url:'source-data/reference/osm-roads-all.geojson', type:'line', on:false,
     paint:{'line-color':'#cfd6e0','line-width':1.2,'line-opacity':.6}},
  {id:'stands', name:'Deer stands', url:'source-data/derived/stands.geojson', type:'circle', on:false,
     paint:{'circle-radius':4,'circle-color':'#ff5a4d','circle-stroke-color':'#fff','circle-stroke-width':1}},
  {id:'food',   name:'Food plots', url:'source-data/derived/food-plots.geojson', type:'circle', on:false,
     paint:{'circle-radius':5,'circle-color':'#7bbf6a','circle-stroke-color':'#10160d','circle-stroke-width':1.2}},
];
// shared rectified frame for the survey-sheet onion-skins (from warp_sheets.py / the demo)
const SHEET_COORDS=[[-81.1655,34.677],[-81.1445,34.677],[-81.1445,34.6455],[-81.1655,34.6455]];
const SHEETS=[
  {id:'s07', name:'07 — deed survey', url:'demo/rectified/07-deed-survey-kasparek.png'},
  {id:'s06', name:'06 — master legend', url:'demo/rectified/06-master-legend-1995.png'},
  {id:'s05', name:'05 — habitat', url:'demo/rectified/05-habitat-full-color.png'},
  {id:'s04', name:'04 — deer stands', url:'demo/rectified/04-deer-stands.png'},
  {id:'s03', name:'03 — trails / water', url:'demo/rectified/03-trails-orange-water-blue.png'},
  {id:'s02', name:'02 — trails', url:'demo/rectified/02-trails-green.png'},
  {id:'s01', name:'01 — base plat', url:'demo/rectified/01-base-plat-clean.png'},
];
let sheetOp=0.7;

const map=new maplibregl.Map({container:'map',
  style:{version:8,sources:{},layers:[{id:'bg',type:'background',paint:{'background-color':'#0b0e0a'}}]},
  center:[-81.1545,34.6605],zoom:14.4,maxZoom:19});
map.addControl(new maplibregl.NavigationControl({showCompass:false}),'bottom-right');
map.addControl(new maplibregl.AttributionControl({compact:true}),'bottom-left');
// keep MapLibre's projection in lock-step with the real container size, or click->coordinate skews
new ResizeObserver(()=>map.resize()).observe(document.getElementById('map'));

function firstRefId(){ const l=map.getStyle().layers.find(x=>x.id.startsWith('rf-')); return l?l.id:undefined; }

map.on('load',async ()=>{
  // base maps (only the first visible)
  BASEMAPS.forEach((b,i)=>{
    map.addSource('bm-'+b.id,{type:'raster',tileSize:256,maxzoom:b.maxzoom,tiles:b.tiles,attribution:b.attr});
    map.addLayer({id:'bm-'+b.id,type:'raster',source:'bm-'+b.id,layout:{visibility:i===0?'visible':'none'}});
  });
  // reference vector layers
  for(const r of REFS){
    try{ const d=await(await fetch(r.url)).json();
      map.addSource('rf-'+r.id,{type:'geojson',data:d});
      map.addLayer({id:'rf-'+r.id,type:r.type,source:'rf-'+r.id,paint:r.paint,layout:{visibility:r.on?'visible':'none'}});
    }catch(e){}
  }
  buildPanel(); restore();
  map.resize();   // correct the projection once layout has settled
});

// survey sheets are lazy-added on first toggle (each PNG is a few MB), and inserted UNDER the
// reference vectors so boundary/trails stay readable on top.
function toggleSheet(sh,on){
  const id='sh-'+sh.id;
  if(on){
    if(!map.getLayer(id)){
      if(!map.getSource(id)) map.addSource(id,{type:'image',url:sh.url,coordinates:SHEET_COORDS});
      map.addLayer({id,type:'raster',source:id,paint:{'raster-opacity':sheetOp}}, firstRefId());
    } else map.setLayoutProperty(id,'visibility','visible');
  } else if(map.getLayer(id)) map.setLayoutProperty(id,'visibility','none');
}

function buildPanel(){
  const P=document.getElementById('panel'); P.innerHTML='';
  const sec=(title)=>{ const d=document.createElement('div'); d.className='psec'; d.innerHTML='<h3>'+title+'</h3>'; P.appendChild(d); return d; };
  // base map (radio)
  const b=sec('Base map');
  BASEMAPS.forEach((m,i)=>{ const lab=document.createElement('label'); lab.className='opt';
    lab.innerHTML='<input type="radio" name="bm" '+(i===0?'checked':'')+'>'+m.name;
    lab.querySelector('input').onchange=()=>{ BASEMAPS.forEach(x=>map.setLayoutProperty('bm-'+x.id,'visibility','none')); map.setLayoutProperty('bm-'+m.id,'visibility','visible'); };
    b.appendChild(lab); });
  // reference layers (checkboxes)
  const r=sec('Reference layers');
  REFS.forEach(rf=>{ const lab=document.createElement('label'); lab.className='opt';
    lab.innerHTML='<input type="checkbox" '+(rf.on?'checked':'')+'>'+rf.name;
    lab.querySelector('input').onchange=(e)=>{ if(map.getLayer('rf-'+rf.id)) map.setLayoutProperty('rf-'+rf.id,'visibility',e.target.checked?'visible':'none'); };
    r.appendChild(lab); });
  // survey sheets (checkboxes + shared opacity)
  const s=sec('1995 survey sheets');
  const sl=document.createElement('label'); sl.className='opt';
  sl.innerHTML='opacity <input type="range" min="0" max="1" step="0.05" value="'+sheetOp+'" style="width:96px">';
  sl.querySelector('input').oninput=(e)=>{ sheetOp=+e.target.value; SHEETS.forEach(sh=>{ if(map.getLayer('sh-'+sh.id)) map.setPaintProperty('sh-'+sh.id,'raster-opacity',sheetOp); }); };
  s.appendChild(sl);
  SHEETS.forEach(sh=>{ const lab=document.createElement('label'); lab.className='opt';
    lab.innerHTML='<input type="checkbox">'+sh.name;
    lab.querySelector('input').onchange=(e)=>toggleSheet(sh,e.target.checked);
    s.appendChild(lab); });
}

// ---- pins ----
function makePin(p){
  const el=document.createElement('div'); el.className='pin'; el.style.borderColor='#fff';
  el.innerHTML='<b>'+p.icon+'</b>'; return el;
}
function setPoint(id,lng,lat,save=true){
  placed[id]={lng,lat};
  if(markers[id]) markers[id].setLngLat([lng,lat]);
  else{
    const m=new maplibregl.Marker({element:makePin(META[id]),anchor:'center',draggable:true}).setLngLat([lng,lat]).addTo(map);
    m.on('dragend',()=>{ const ll=m.getLngLat(); placed[id]={lng:ll.lng,lat:ll.lat}; renderList(); autosave(); });
    m.getElement().addEventListener('click',(e)=>{ e.stopPropagation(); arm(id); });
    markers[id]=m;
  }
  renderList(); if(save) autosave();
}
function clearPoint(id){ if(markers[id]){markers[id].remove(); delete markers[id];} delete placed[id]; renderList(); autosave(); }

// ---- arm / place ----
function arm(id){ armed=id; renderList();
  const h=document.getElementById('hint'); h.style.opacity=1;
  h.innerHTML='Click the map to place <b>'+META[id].name+'</b>'+(META[id].hint?' — '+META[id].hint:'');
  map.getCanvas().style.cursor='crosshair';
}
function disarm(){ armed=null; map.getCanvas().style.cursor=''; document.getElementById('hint').innerHTML='Pick a point from the list, then click the map'; renderList(); }
map.on('click',(e)=>{
  if(!armed) return;
  const id=armed; setPoint(id,e.lngLat.lng,e.lngLat.lat);
  const next=ALL.find(p=>!placed[p.id]);            // auto-advance to the next unplaced
  if(next) arm(next.id); else disarm();
});

// ---- sidebar ----
function renderList(){
  const L=document.getElementById('list'); L.innerHTML='';
  for(const [title,items] of GROUPS){
    const h=document.createElement('div'); h.className='grp'; h.innerHTML=title; L.appendChild(h);
    for(const p of items){
      const done=!!placed[p.id];
      const it=document.createElement('div'); it.className='it'+(done?' done':'')+(armed===p.id?' armed':'');
      const ll=done?placed[p.id]:null;
      it.innerHTML='<span class="ic">'+p.icon+'</span><span class="nm">'+p.name+(p.hint?'<small>'+p.hint+'</small>':'')+
        '</span><span class="st">'+(done?ll.lat.toFixed(4)+', '+ll.lng.toFixed(4):'not set')+'</span><span class="x">✕</span>';
      it.querySelector('.nm').onclick=()=>arm(p.id); it.querySelector('.ic').onclick=()=>arm(p.id);
      it.querySelector('.st').onclick=()=>arm(p.id);
      it.querySelector('.x').onclick=(e)=>{ e.stopPropagation(); clearPoint(p.id); };
      L.appendChild(it);
    }
  }
  document.getElementById('nDone').textContent=Object.keys(placed).length;
  document.getElementById('nTot').textContent=ALL.length;
}

// ---- save / restore (serve.py /api/save, kind:trace) ----
function toFC(){
  return {type:'FeatureCollection', _doc:'K-Farm POI points placed via place-points.html',
    features:ALL.filter(p=>placed[p.id]).map(p=>({type:'Feature',
      properties:{id:p.id,name:p.name,icon:p.icon,pri:GROUPS.findIndex(g=>g[1].includes(p))+1},
      geometry:{type:'Point',coordinates:[placed[p.id].lng,placed[p.id].lat]}}))};
}
function setStat(s){ document.getElementById('saveStat').textContent=s; }
async function save(){
  setStat('saving…');
  try{ const r=await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({kind:'trace',name:'poi-points.geojson',data:toFC()})});
    const j=await r.json(); setStat(j.ok?('saved ✓ '+Object.keys(placed).length+' pts'):'save failed'); }
  catch(e){ setStat('save failed (server?)'); }
}
function autosave(){ clearTimeout(saveT); saveT=setTimeout(save,500); }
document.getElementById('saveBtn').onclick=save;
async function restore(){
  try{ const d=await(await fetch('source-data/traces/poi-points.geojson',{cache:'no-store'})).json();
    for(const f of d.features||[]){ const id=f.properties&&f.properties.id; const c=f.geometry&&f.geometry.coordinates;
      if(id&&META[id]&&c) setPoint(id,c[0],c[1],false); }
  }catch(e){}
  renderList();
}

renderList();
</script>
</body>
</html>
